<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Media Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="media-player">
        <div class="player-header">
            <h1>Modern Media Player</h1>
            <div class="input-controls">
                <input type="file" id="media-file" accept="audio/*,video/*" multiple>
                <label for="media-file" class="file-upload-btn">
                    <i class="fas fa-plus"></i> Add Media
                </label>
                <div class="stream-input">
                    <input type="text" id="stream-url" placeholder="Enter URL or Search">
                    <button id="stream-btn" class="stream-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="platform-buttons">
                    <button class="platform-btn youtube-btn" title="YouTube">
                        <i class="fab fa-youtube"></i>
                    </button>
                    <button class="platform-btn spotify-btn" title="Spotify">
                        <i class="fab fa-spotify"></i>
                    </button>
                    <button class="platform-btn saavn-btn" title="JioSaavn">
                        <img src="https://www.jiosaavn.com/favicon.ico" alt="JioSaavn">
                    </button>
                    <button class="platform-btn gaana-btn" title="Gaana">
                        <img src="https://www.gaana.com/favicon.ico" alt="Gaana">
                    </button>
                </div>
            </div>
        </div>

        <div class="media-container">
            <video id="video-player" class="hidden"></video>
            <div class="playlist">
                <h2>Playlist</h2>
                <ul id="playlist-items"></ul>
            </div>
        </div>

        <div class="player-controls">
            <div class="media-info">
                <div class="media-title">No media selected</div>
                <div class="media-source">-</div>
            </div>
            
            <div class="progress-bar">
                <div class="progress"></div>
                <div class="progress-time">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="control-buttons">
                <button id="prev" class="control-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="play" class="control-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button id="next" class="control-btn">
                    <i class="fas fa-forward"></i>
                </button>
                <div class="volume-control">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
                </div>
                <button id="fullscreen" class="control-btn">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="script.js"></script>
</body>
</html>
